deptrac:
  paths:
    - ./app
  exclude_files: []
  layers:
    - name: Domain
      collectors:
        - type: classLike
          value: App\\Domain\\.*
    - name: Application
      collectors:
        - type: classLike
          value: App\\Application\\.*
    - name: Infrastructure
      collectors:
        - type: classLike
          value: App\\Infrastructure\\.*
    - name: Models
      collectors:
        - type: classLike
          value: App\\Models\\.*
    - name: Concerns
      collectors:
        - type: classLike
          value: App\\Concerns\\.*
    - name: Policies
      collectors:
        - type: classLike
          value: App\\Policies\\.*
    - name: Framework
      collectors:
        - type: bool
          must:
            - type: classLike
              value: App\\.*
          must_not:
            - type: classLike
              value: App\\Domain\\.*
            - type: classLike
              value: App\\Application\\.*
            - type: classLike
              value: App\\Infrastructure\\.*
            - type: classLike
              value: App\\Models\\.*
            - type: classLike
              value: App\\Concerns\\.*
            - type: classLike
              value: App\\Policies\\.*
  ruleset:
    Domain:
      - Domain
      - Models
      - Framework
    Application:
      - Domain
      - Application
      - Models
      - Framework
    Infrastructure:
      - Domain
      - Application
      - Infrastructure
      - Models
      - Concerns
      - Framework
    Models:
      - Domain
      - Models
      - Concerns
      - Framework
    Concerns:
      - Domain
      - Models
      - Concerns
      - Framework
    Policies:
      - Domain
      - Models
      - Policies
      - Framework
    Framework:
      - Domain
      - Application
      - Models
      - Concerns
      - Policies
      - Framework
